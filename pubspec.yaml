name: augen
description: A Flutter plugin for building AR applications using ARCore on Android and RealityKit on iOS. Enables pure Dart AR development without native code.
version: 1.3.0
homepage: https://github.com/AminMemariani/augen
repository: https://github.com/AminMemariani/augen
issue_tracker: https://github.com/AminMemariani/augen/issues

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.augen
        pluginClass: AugenPlugin
      ios:
        pluginClass: AugenPlugin
      web:
        pluginClass: AugenWebPlugin
        fileName: src/web/augen_web_plugin.dart
